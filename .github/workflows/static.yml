<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Privacy Policy - BreedSureAI</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            margin: 40px;
            background-color: #f9f9f9;
            color: #333;
        }
        h1, h2 {
            color: #2E7D32;
        }
        .container {
            max-width: 900px;
            margin: auto;
            background: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        a {
            color: #2E7D32;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Privacy Policy</h1>
    <p><strong>Last Updated:</strong> April 2026</p>

    <p>
        BreedSureAI ("we", "our", or "us") is committed to protecting your privacy.
        This Privacy Policy explains how we collect, use, and safeguard your information
        when you use our mobile application.
    </p>

    <h2>1. Information We Collect</h2>
    <p>We may collect the following types of information:</p>

    <ul>
        <li><strong>Personal Information:</strong> Name, phone number, or account details (if login is required)</li>
        <li><strong>Animal Data:</strong> Breed details, health records, milk yield, vaccination history</li>
        <li><strong>Images:</strong> Photos captured for AI breed identification</li>
        <li><strong>Device Information:</strong> Device type, OS version, app usage data</li>
    </ul>

    <h2>2. How We Use Your Information</h2>
    <p>Your data is used to:</p>
    <ul>
        <li>Provide AI-powered breed detection</li>
        <li>Maintain digital livestock records</li>
        <li>Generate analytics and reports</li>
        <li>Send vaccination reminders and alerts</li>
        <li>Improve app performance and features</li>
    </ul>

    <h2>3. Camera & Gallery Access</h2>
    <p>
        Our app requires access to your camera and gallery to capture and upload images
        of livestock for breed identification. These images are only used for analysis
        and are not shared without your consent.
    </p>

    <h2>4. Data Sharing</h2>
    <p>
        We do not sell your personal data. Data may be shared only in the following cases:
    </p>
    <ul>
        <li>With authorized BPA Officers for official livestock registration</li>
        <li>When required by law or government authorities</li>
    </ul>

    <h2>5. Data Security</h2>
    <p>
        We implement appropriate security measures to protect your data.
        However, no system is 100% secure, and we cannot guarantee absolute security.
    </p>

    <h2>6. Data Retention</h2>
    <p>
        We retain your data only as long as necessary to provide services
        or comply with legal obligations.
    </p>

    <h2>7. Your Rights</h2>
    <p>You have the right to:</p>
    <ul>
        <li>Access your data</li>
        <li>Request correction or deletion</li>
        <li>Withdraw consent</li>
    </ul>

    <h2>8. Children's Privacy</h2>
    <p>
        Our app is not intended for children under 13. We do not knowingly collect
        data from children.
    </p>

    <h2>9. Changes to This Policy</h2>
    <p>
        We may update this Privacy Policy from time to time.
        Updates will be posted on this page.
    </p>

    <h2>10. Contact Us</h2>
    <p>
        If you have any questions about this Privacy Policy, you can contact us at:
        <br><br>
        📧 Email: support@breedsureai.com
    </p>

</div>

</body>
</html>
